apiVersion: apps/v1
kind: Deployment
metadata:
  name: parksight-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parksight-api
  template:
    metadata:
      labels:
        app: parksight-api
    spec:
      containers:
      - name: api
        image: parksight-api:latest
        ports:
        - containerPort: 8000
